services:
  localpulse:
    build: .
    container_name: localpulse
    restart: unless-stopped
    ports:
      - "8765:8765"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      # Gmail address to send from (must match the app password account)
      - EMAIL_FROM=${EMAIL_FROM}
      # Gmail App Password (generate at myaccount.google.com/apppasswords)
      - EMAIL_PASSWORD=${EMAIL_PASSWORD}
      # Recipient — defaults to havens.jeremy@gmail.com if not set
      - EMAIL_TO=${EMAIL_TO:-havens.jeremy@gmail.com}
      # Cron schedule (default: 7am daily). Uses standard cron syntax.
      - TZ=America/Detroit
      - FETCH_CRON=0 7 * * *
    volumes:
      # Persistent storage for news.json, fetch.log, cron.log
      - localpulse_data:/app/data

volumes:
  localpulse_data:
